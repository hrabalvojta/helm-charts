extends: default

ignore: |
  .git/
  .codex/
  charts/**/templates/

rules:
  comments:
    min-spaces-from-content: 1
  document-start: disable
  comments-indentation: disable
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values:
      - "true"
      - "false"
      - "on"
      - "off"
    check-keys: false
