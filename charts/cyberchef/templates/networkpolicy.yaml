{{- if .Values.networkPolicy.enabled }}
{{- $egressRules := .Values.networkPolicy.egress | default (list) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberchef.fullname" . }}
  labels:
    {{- include "cyberchef.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cyberchef.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    {{- if gt (len $egressRules) 0 }}
    {{- toYaml $egressRules | nindent 4 }}
    {{- else }}
    []
    {{- end }}
{{- end }}
