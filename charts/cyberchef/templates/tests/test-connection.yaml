apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cyberchef.fullname" . }}-test-connection"
  labels:
    {{- include "cyberchef.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  {{- with include "cyberchef.annotations" (dict "root" . "annotations" (dict "helm.sh/hook" "test" "helm.sh/hook-delete-policy" "before-hook-creation,hook-succeeded")) }}
  {{- trim . | nindent 2 }}
  {{- end }}
spec:
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 8 }}
  {{- end }}
  serviceAccountName: {{ include "cyberchef.serviceAccountName" . }}
  automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: wget
      image: {{ include "cyberchef.testImage" . | quote }}
      imagePullPolicy: {{ .Values.test.image.pullPolicy }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      command: ['wget']
      args: ['-qO-', 'http://{{ include "cyberchef.fullname" . }}:{{ .Values.service.port }}']
      volumeMounts:
        - name: tmp
          mountPath: /tmp
          readOnly: false
      {{- with .Values.test.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumes:
    - name: tmp
      {{- if .Values.tmpVolume.sizeLimit }}
      emptyDir:
        sizeLimit: {{ .Values.tmpVolume.sizeLimit | quote }}
      {{- else }}
      emptyDir: {}
      {{- end }}
  restartPolicy: Never
