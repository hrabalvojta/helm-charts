apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cyberchef.fullname" . }}-test-connection"
  labels:
    {{- include "cyberchef.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 8 }}
  {{- end }}
  serviceAccountName: {{ include "cyberchef.serviceAccountName" . }}
  automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 8 }}
  {{- end }}
  containers:
    - name: wget
      image: busybox
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 12 }}
      {{- end }}
      command: ['wget']
      args: ['-qO-', 'http://{{ include "cyberchef.fullname" . }}:{{ .Values.service.port }}']
      volumeMounts:
        - name: tmp
          mountPath: /tmp
          readOnly: false
  volumes:
    - name: tmp
      emptyDir: {}
  restartPolicy: Never
