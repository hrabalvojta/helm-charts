# Default values for cyberchef.

# -- Number of Deployment replicas when autoscaling is disabled.
replicaCount: 1

image:
  # -- Container image repository.
  repository: docker.io/mpepping/cyberchef
  # -- Image pull policy.
  pullPolicy: Always
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""
  # -- Optional immutable image digest. When set, the image renders as repository:tag@digest.
  digest: ""

# -- Image pull secrets.
imagePullSecrets: []
# -- Override the chart name.
nameOverride: ""
# -- Override the fully qualified app name.
fullnameOverride: ""

serviceAccount:
  # -- Create a service account.
  create: true
  # -- Automatically mount service account API credentials.
  automount: false
  # -- Service account annotations.
  annotations: {}
  # -- Service account name. Generated when empty and `serviceAccount.create=true`.
  name: ""

# -- Pod annotations.
podAnnotations: {}
# -- Pod labels.
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsGroup: 10001
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true

# -- Deployment update strategy.
strategy:
  type: RollingUpdate

# -- Default environment variables for the CyberChef container.
env:
  TZ: UTC

# -- Additional Kubernetes `env` entries appended to the CyberChef container.
extraEnv: []
  # - name: SOME_VAR
  #   value: some-value

# -- Port exposed by the CyberChef container and nginx listener.
containerPort: 8000

service:
  # -- Service type.
  type: ClusterIP
  # -- Service annotations.
  annotations: {}
  # -- Service port.
  port: 8000
  # -- Service target port. Defaults to the named container port.
  targetPort: http
  # -- Optional appProtocol value for the service port.
  appProtocol: http
  # -- Optional fixed nodePort when `service.type` is `NodePort` or `LoadBalancer`.
  nodePort: ""
  # -- Optional LoadBalancer IP when supported by the cluster.
  loadBalancerIP: ""
  # -- Optional LoadBalancer source ranges.
  loadBalancerSourceRanges: []
  # -- Required when `service.type=ExternalName`.
  externalName: ""

networkPolicy:
  enabled: true
  # -- Optional ingress peer selectors for the generated NetworkPolicy. Empty allows ingress from any source to the HTTP port.
  ingressFrom: []
  # -- Egress rules. Empty means deny all egress.
  egress: []

# -- Ingress configuration.
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Gateway API HTTPRoute configuration.
httpRoute:
  # -- Enable HTTPRoute.
  enabled: false
  # -- HTTPRoute annotations.
  annotations: {}
  # -- Gateway parent references.
  parentRefs:
    - name: gateway
      sectionName: http
    # namespace: default
  # -- Hostnames matched by the HTTPRoute.
  hostnames:
    - chart-example.local
  # -- HTTPRoute rules.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

# -- Container resource requests and limits.
resources:
  limits:
    cpu: 200m
    ephemeral-storage: 256Mi
    memory: 128Mi
  requests:
    cpu: 10m
    ephemeral-storage: 16Mi
    memory: 16Mi

# -- Liveness probe.
livenessProbe:
  tcpSocket:
    port: http
  failureThreshold: 6
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
# -- Readiness probe.
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  failureThreshold: 3
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2

# -- HorizontalPodAutoscaler configuration.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

# -- Settings for the writable nginx temporary directory.
tmpVolume:
  # -- Optional size limit for the `/tmp` emptyDir.
  sizeLimit: 64Mi

# -- Additional volumes appended to the Deployment pod.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# -- Additional volume mounts appended to the CyberChef container.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# -- Additional Kubernetes manifests rendered by this chart.
extraObjects: []
  # - apiVersion: v1
  #   kind: Secret
  #   metadata:
  #     name: my-extra-secret
  #   type: Opaque
  #   stringData:
  #     key: value

nodeSelector: {}

tolerations: []

affinity: {}

# -- Pod topology spread constraints.
topologySpreadConstraints: []

# -- Optional overrides for the bundled nginx configuration files.
config:
  default_conf: ""
  nginx_conf: ""

# -- Helm test pod configuration.
test:
  image:
    # -- Helm test image repository.
    repository: docker.io/library/busybox
    # -- Helm test image pull policy.
    pullPolicy: Always
    # -- Helm test image tag.
    tag: "1.37.0"
    # -- Optional immutable Helm test image digest.
    digest: ""
  # -- Helm test pod resource requests and limits.
  resources:
    limits:
      cpu: 50m
      ephemeral-storage: 16Mi
      memory: 32Mi
    requests:
      cpu: 10m
      ephemeral-storage: 8Mi
      memory: 16Mi
