# Default values for cyberchef.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: docker.io/mpepping/cyberchef
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v10.24.0"  # renovate: datasource=docker depName=docker.io/mpepping/cyberchef

# This is for the secrets for pulling an image from a private repository.
# More information can be found here:
# https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created.
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account.
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Optional management of the release namespace. This is intended for dedicated namespaces only.
namespace:
  # -- Create and label the Helm release namespace.
  create: false
  # -- Additional annotations applied to the namespace when `namespace.create=true`.
  annotations: {}
  # -- Additional labels applied to the namespace when `namespace.create=true`.
  labels: {}
  psa:
    # -- Apply Pod Security Admission labels to the namespace when `namespace.create=true`.
    enabled: false
    # -- PSA enforce profile.
    enforce: restricted
    # -- PSA warn profile.
    warn: restricted
    # -- PSA audit profile.
    audit: restricted
    # -- PSA policy version. Use an explicit cluster version for predictable upgrades.
    version: latest

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsGroup: 10001
  runAsUser: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true

# -- Suggest recreate for persistance enabled and RollingUpdate for persistance disabled
strategy:
  type: RollingUpdate

# -- Default environment variables for the CyberChef container.
env:
  TZ: UTC

# -- Additional Kubernetes `env` entries appended to the CyberChef container.
extraEnv: []
  # - name: SOME_VAR
  #   value: some-value

# This is for setting up a service.
# More information can be found here:
# https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type.
  # More information can be found here:
  # https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports.
  # More information can be found here:
  # https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8000

networkPolicy:
  enabled: true
  # Default to deny-all egress. Add explicit rules only if the workload genuinely
  # needs outbound network access.
  egress: []

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
    # - secretName: chart-example-tls
    #   hosts:
    #     - chart-example.local

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # HTTPRoute enabled.
  enabled: false
  # HTTPRoute annotations.
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
    - name: gateway
      sectionName: http
    # namespace: default
  # Hostnames matching HTTP header.
  hostnames:
    - chart-example.local
  # List of rules and filters applied.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

resources:
  # Conservative defaults that keep autoscaling math valid and avoid shipping an entirely
  # unconstrained workload. Override these values if your environment requires different sizing.
  limits:
    cpu: 200m
    ephemeral-storage: 1Gi
    memory: 512Mi
  requests:
    cpu: 50m
    ephemeral-storage: 128Mi
    memory: 16Mi

# This is to setup the liveness and readiness probes.
# More information can be found here:
# https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  tcpSocket:
    port: http
  failureThreshold: 6
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: /
    port: http
  failureThreshold: 3
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# This section is for setting up persistent storage
persistence:
  enabled: false
  accessMode: ReadWriteOnce
  mountPath: /data
  size: 1Gi
  # -- Keep the PVC resource when uninstalling the Helm release.
  retain: false
  storageClass: ""  # Optional: Use a specific storage class.

# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# -- Additional Kubernetes manifests rendered by this chart.
extraObjects: []
  # - apiVersion: v1
  #   kind: Secret
  #   metadata:
  #     name: my-extra-secret
  #   type: Opaque
  #   stringData:
  #     key: value

nodeSelector: {}

tolerations: []

affinity: {}

# -- Optional overrides for the bundled nginx configuration files.
config:
  default_conf: ""
  nginx_conf: ""
