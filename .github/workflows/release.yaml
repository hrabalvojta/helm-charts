name: release

on:
  push:
    branches:
      - main
    paths:
      - charts/**
      - scripts/**
      - artifacthub-repo.yml
      - .github/actions/**
      - .github/release-template.md
      - .github/workflows/release.yaml
  workflow_dispatch:
    inputs:
      mode:
        description: Release scope selection mode.
        required: true
        default: selected
        type: choice
        options:
          - selected
          - all
      charts:
        description: Comma-separated chart directories to release when mode is selected.
        required: false
        default: ""
        type: string
      confirm_all:
        description: Explicitly acknowledge that all charts should be released when mode is all.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  REGISTRY: ghcr.io
  OCI_NAMESPACE: ${{ github.repository }}
  PAGES_BRANCH: gh-pages
  COSIGN_CERT_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yaml@${{ github.ref }}

jobs:
  detect:
    name: Detect Release Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      charts_json: ${{ steps.detect.outputs.charts_json }}
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect charts to release
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
          DISPATCH_MODE: ${{ github.event.inputs.mode || 'selected' }}
          DISPATCH_CHARTS: ${{ github.event.inputs.charts || '' }}
          DISPATCH_CONFIRM_ALL: ${{ github.event.inputs.confirm_all || 'false' }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${DISPATCH_MODE}" in
              selected)
                [ -n "${DISPATCH_CHARTS}" ] || {
                  printf 'workflow_dispatch mode=selected requires the "charts" input to be set\n' >&2
                  exit 1
                }

                mapfile -t requested_chart_dirs < <(
                  printf '%s\n' "${DISPATCH_CHARTS}" | tr ',' '\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | awk 'NF'
                )

              [ "${#requested_chart_dirs[@]}" -gt 0 ] || {
                printf 'workflow_dispatch input "charts" did not resolve to any chart directories\n' >&2
                exit 1
              }

              for chart_dir in "${requested_chart_dirs[@]}"; do
                [ -f "${chart_dir}/Chart.yaml" ] || {
                  printf 'Selected chart directory does not exist or is missing Chart.yaml: %s\n' "${chart_dir}" >&2
                  exit 1
                }
              done

                charts_json="$(printf '%s\n' "${requested_chart_dirs[@]}" | jq -R . | jq -cs .)"
                ;;
              all)
                [ "${DISPATCH_CONFIRM_ALL}" = "true" ] || {
                  printf 'workflow_dispatch mode=all requires confirm_all=true\n' >&2
                  exit 1
                }
                charts_json="$(./scripts/chart-tool.sh discover all --format json)"
                ;;
              *)
                printf 'Unsupported workflow_dispatch mode: %s\n' "${DISPATCH_MODE}" >&2
                exit 1
                ;;
            esac
          elif [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            charts_json="$(./scripts/chart-tool.sh discover all --format json)"
          else
            charts_json="$(./scripts/chart-tool.sh discover changed --base "${BEFORE_SHA}" --head "${HEAD_SHA}" --format json)"
          fi

          changed=true

          printf 'charts_json=%s\n' "${charts_json}" >> "${GITHUB_OUTPUT}"
          printf 'changed=%s\n' "${changed}" >> "${GITHUB_OUTPUT}"

          {
            echo '### Release Scope'
            if [ "$(jq 'length' <<<"${charts_json}")" -gt 0 ]; then
              jq -r '.[] | "- `\(.)`"' <<<"${charts_json}"
            else
              echo '- no charts selected; pages metadata sync only'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  publish:
    name: Publish Charts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup publishing tooling
        uses: ./.github/actions/setup-chart-tooling
        with:
          install-helm: "true"
          install-helm-docs: "true"
          install-cosign: "true"
          install-kube-score: "true"
          install-yq: "true"

      - name: Enforce version bumps on release branch
        if: github.event_name == 'push' && needs.detect.outputs.changed == 'true'
        run: ./scripts/chart-tool.sh version check --base "${{ github.event.before }}" --head "${{ github.sha }}"

      - name: Authenticate to GHCR for OCI signing clients
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate Helm registry client
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish charts and update gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/chart-tool.sh release publish --charts-json '${{ needs.detect.outputs.charts_json }}'
