name: Setup Chart Tooling
description: Install the toolchain required by the chart repository workflows.

inputs:
  install-helm:
    description: Install Helm.
    required: false
    default: "false"
  helm-version:
    description: Helm version to install.
    required: false
    default: v3.19.0
  install-helm-docs:
    description: Install helm-docs.
    required: false
    default: "false"
  helm-docs-version:
    description: helm-docs version to install.
    required: false
    default: v1.14.2
  install-actionlint:
    description: Install actionlint.
    required: false
    default: "false"
  actionlint-version:
    description: actionlint version to install.
    required: false
    default: v1.7.11
  install-cosign:
    description: Install cosign.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Helm
      if: inputs.install-helm == 'true'
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        version: ${{ inputs.helm-version }}

    - name: Setup PATH for downloaded tools
      if: inputs.install-helm-docs == 'true' || inputs.install-actionlint == 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${RUNNER_TEMP}/bin"
        printf '%s\n' "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

    - name: Install helm-docs
      if: inputs.install-helm-docs == 'true'
      shell: bash
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install helm-docs --version "${{ inputs.helm-docs-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install actionlint
      if: inputs.install-actionlint == 'true'
      shell: bash
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install actionlint --version "${{ inputs.actionlint-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install Cosign
      if: inputs.install-cosign == 'true'
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
