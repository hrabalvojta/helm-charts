name: Setup Chart Tooling
description: Install the toolchain required by the chart repository workflows.

inputs:
  install-helm:
    description: Install Helm.
    required: false
    default: "false"
  helm-version:
    description: Helm version to install.
    required: false
    default: v3.19.0
  install-helm-docs:
    description: Install helm-docs.
    required: false
    default: "false"
  helm-docs-version:
    description: helm-docs version to install.
    required: false
    default: v1.14.2
  install-actionlint:
    description: Install actionlint.
    required: false
    default: "false"
  actionlint-version:
    description: actionlint version to install.
    required: false
    default: v1.7.11
  install-cosign:
    description: Install cosign.
    required: false
    default: "false"
  install-yq:
    description: Install yq.
    required: false
    default: "false"
  yq-version:
    description: yq version to install.
    required: false
    default: v4.49.2
  install-yamllint:
    description: Install yamllint.
    required: false
    default: "false"
  yamllint-version:
    description: yamllint version to install.
    required: false
    default: "1.38.0"
  install-shfmt:
    description: Install shfmt.
    required: false
    default: "false"
  shfmt-version:
    description: shfmt version to install.
    required: false
    default: v3.12.0
  install-gitleaks:
    description: Install gitleaks.
    required: false
    default: "false"
  gitleaks-version:
    description: gitleaks version to install.
    required: false
    default: v8.28.0
  install-kube-score:
    description: Install kube-score.
    required: false
    default: "false"
  kube-score-version:
    description: kube-score version to install.
    required: false
    default: v1.20.0

runs:
  using: composite
  steps:
    - name: Setup Helm
      if: inputs.install-helm == 'true'
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        version: ${{ inputs.helm-version }}

    - name: Setup PATH for downloaded tools
      if: >-
        inputs.install-yq == 'true' ||
        inputs.install-helm-docs == 'true' ||
        inputs.install-actionlint == 'true' ||
        inputs.install-shfmt == 'true' ||
        inputs.install-gitleaks == 'true' ||
        inputs.install-kube-score == 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${RUNNER_TEMP}/bin"
        printf '%s\n' "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

    - name: Setup PATH for Python tools
      if: inputs.install-yamllint == 'true'
      shell: bash
      run: |
        set -euo pipefail
        printf '%s\n' "${HOME}/.local/bin" >> "${GITHUB_PATH}"

    - name: Install yamllint
      if: inputs.install-yamllint == 'true'
      shell: bash
      run: |
        set -euo pipefail
        python3 -m ensurepip --upgrade >/dev/null
        python3 -m pip install --user --disable-pip-version-check --no-input "yamllint==${{ inputs.yamllint-version }}"

    - name: Install yq
      if: inputs.install-yq == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install yq --version "${{ inputs.yq-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install helm-docs
      if: inputs.install-helm-docs == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install helm-docs --version "${{ inputs.helm-docs-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install actionlint
      if: inputs.install-actionlint == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install actionlint --version "${{ inputs.actionlint-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install shfmt
      if: inputs.install-shfmt == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install shfmt --version "${{ inputs.shfmt-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install gitleaks
      if: inputs.install-gitleaks == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install gitleaks --version "${{ inputs.gitleaks-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install kube-score
      if: inputs.install-kube-score == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        ./scripts/chart-tool.sh tools install kube-score --version "${{ inputs.kube-score-version }}" --install-dir "${RUNNER_TEMP}/bin"

    - name: Install Cosign
      if: inputs.install-cosign == 'true'
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
